{% extends "base.html" %}

{% block title %}Teacher Profile{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-success text-white">
            <h3>👤 Teacher Profile</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Name</label>

                    <input
                        type="text"
                        class="form-control"
                        name="name"
                        value="{{ user.name }}"
                    >
                </div>

                <div class="mb-3">
                    <label>Email</label>

                    <input
                        type="email"
                        class="form-control"
                        name="email"
                        value="{{ user.email }}"
                    >
                </div>

                <button class="btn btn-success">
                    💾 Update Profile
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
