{% extends "base.html" %} {% block title %} Student Profile {% endblock %} {%
block content %}

<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3>👤 Student Profile</h3>
    </div>

    <div class="card-body">
      <div class="text-center mb-4">
        <img
          src="{{ url_for('static', filename='uploads/students/' + student.photo) }}"
          width="180"
          class="rounded-circle border"
        />
      </div>

      <form method="POST">
        <div class="mb-3">
          <label>Name</label>

          <input class="form-control" value="{{ student.name }}" readonly />
        </div>

        <div class="mb-3">
          <label>Register Number</label>

          <input
            class="form-control"
            value="{{ student.register_no }}"
            readonly
          />
        </div>

        <div class="mb-3">
          <label>Department</label>

          <input
            class="form-control"
            value="{{ student.department }}"
            readonly
          />
        </div>

        <div class="mb-3">
          <label>Email</label>

          <input
            type="email"
            name="email"
            class="form-control"
            value="{{ student.email }}"
          />
        </div>

        <div class="mb-3">
          <label>Phone</label>

          <input
            name="phone"
            class="form-control"
            value="{{ student.phone }}"
          />
        </div>

        <button class="btn btn-success">💾 Update Profile</button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
