{% extends "base.html" %}
{% block title %}Student Profile{% endblock %}

{% block content %}

<div class="container mt-4">
  <div class="card shadow-lg border-0">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">👤 Student Profile</h3>
    </div>

    <div class="card-body">

      <!-- Profile Picture -->
      <div class="text-center mb-4">
        <img
          src="{{ url_for('static', filename='uploads/students/' ~ student.photo) }}"
          class="profile-image"
          alt="Profile Picture"
        />
      </div>

      <form method="POST">

        <div class="mb-3">
          <label class="form-label">Name</label>
          <input
            type="text"
            class="form-control"
            value="{{ student.name }}"
            readonly
          >
        </div>

        <div class="mb-3">
          <label class="form-label">Register Number</label>
          <input
            type="text"
            class="form-control"
            value="{{ student.register_no }}"
            readonly
          >
        </div>

        <div class="mb-3">
          <label class="form-label">Department</label>
          <input
            type="text"
            class="form-control"
            value="{{ student.department.name }}"
            readonly
          >
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            type="email"
            name="email"
            class="form-control"
            value="{{ student.email }}"
          >
        </div>

        <div class="mb-3">
          <label class="form-label">Phone</label>
          <input
            type="text"
            name="phone"
            class="form-control"
            value="{{ student.phone }}"
          >
        </div>

        <div class="d-flex gap-3 mt-4">
          <button type="submit" class="btn btn-success">
            💾 Update Profile
          </button>

          <a
            href="{{ url_for('main.student_dashboard') }}"
            class="btn btn-secondary"
          >
            ← Back
          </a>
        </div>

      </form>

    </div>
  </div>
</div>

{% endblock %}
