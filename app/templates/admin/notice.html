{% extends "base.html" %} {% block title %} Notice Board {% endblock %} {% block
content %}

<div class="container mt-4">
  <h2>📢 Notice Board</h2>

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Title</label>

      <input type="text" class="form-control" name="title" required />
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>

      <textarea
        class="form-control"
        rows="5"
        name="description"
        required
      ></textarea>
    </div>

    <button class="btn btn-primary">Post Notice</button>
  </form>

  <hr />

  {% for notice in notices %}

  <div class="card mt-3 shadow-sm">
    <div class="card-body">
      <h4>{{ notice.title }}</h4>

      <p>{{ notice.description }}</p>

      <small class="text-muted"> {{ notice.notice_date }} </small>
    </div>
  </div>

  {% else %}

  <div class="alert alert-info">No notices available.</div>

  {% endfor %}
</div>

{% endblock %}
